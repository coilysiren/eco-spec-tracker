{% extends "base.html" %}
{% block title %}player ⇒ professions{% endblock %}
{% block content %}
  <h2 class="mb-4 text-xl font-semibold">[ player ⇒ professions ]</h2>
  <table class="w-full border-collapse text-sm">
    <thead>
      <tr class="border-b border-slate-700 text-left text-[11px] uppercase tracking-wide text-slate-400">
        <th class="py-2 pr-4 font-medium">Player</th>
        <th class="py-2 font-medium">Professions</th>
      </tr>
    </thead>
    <tbody>
      {% for r in rows %}
        <tr class="border-b border-slate-800 {% if not r.active %}opacity-50{% endif %}">
          <td class="py-2 pr-4 font-medium">{{ r.player }}</td>
          <td class="py-2 tabular-nums">{{ r.professions | join(", ") }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
