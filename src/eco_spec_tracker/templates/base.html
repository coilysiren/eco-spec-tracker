<!doctype html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}eco-jobs-tracker{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: { DEFAULT: '#7ec27e', dim: '#4f7a4f' },
          },
          fontFamily: {
            sans: ['system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>{{ eco_mcp_css | safe }}</style>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
</head>
<body class="min-h-full font-sans antialiased">
  <header class="flex items-center justify-between border-b border-slate-800 bg-slate-900 px-6 py-3">
    <h1 class="m-0 text-lg font-semibold tracking-wide">
      <a href="/" class="text-slate-100 hover:text-accent">eco-jobs-tracker</a>
    </h1>
    <nav class="flex flex-wrap gap-4 text-sm">
      <a href="/" class="text-accent hover:underline">Home</a>
      <a href="/professions" class="text-accent hover:underline">Professions</a>
      <a href="/specialties" class="text-accent hover:underline">Specialties</a>
      <a href="/players" class="text-accent hover:underline">Players</a>
      <a href="/api/v1/professions" class="text-accent hover:underline">JSON</a>
    </nav>
  </header>

  <main class="mx-auto max-w-6xl px-6 py-6">
    {% block content %}{% endblock %}
  </main>

  <footer class="mt-12 border-t border-slate-800 bg-slate-900 py-8 text-center text-xs text-slate-500">
    <p class="mb-6 text-slate-400">jobs data is mock; Eco server card above is live via eco-mcp-app</p>

    <div class="tracking-[0.75em] text-accent">✦ ✦ ✦</div>
    <p class="my-4">Copyright 2026 Kai Siren</p>

    <div class="tracking-[0.75em] text-accent">✦ ✦ ✦</div>
    <p class="my-4">
      <a href="https://www.coilysiren.me/" class="text-accent hover:underline">coilysiren.me</a>
      <span class="mx-2 text-slate-600">·</span>
      <a href="https://github.com/coilysiren/eco-spec-tracker" class="text-accent hover:underline">source on GitHub</a>
    </p>
  </footer>
  {{ livereload_script | safe }}
</body>
</html>
