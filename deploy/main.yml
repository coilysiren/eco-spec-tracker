apiVersion: v1
kind: Namespace
metadata:
  name: ${NAME}

---
# Sentry DSN for this service, synced from AWS SSM via external-secrets.
# Consumed by src/eco_spec_tracker/telemetry.py's
# `sentry_sdk.init(dsn=os.getenv("SENTRY_DSN"))`.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ${NAME}-sentry
  namespace: ${NAME}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: ${NAME}-sentry
    creationPolicy: Owner
  data:
    - secretKey: SENTRY_DSN
      remoteRef:
        key: /sentry-dsn/eco-spec-tracker

---
# Eco admin API token. The mod's /api/v1/skills endpoint runs inside Eco's
# ASP.NET Core host, which requires X-API-Key on /api/v1/* (same middleware
# eco-mcp-app hits for /api/v1/exporter/*). upstream.py forwards the token
# via UPSTREAM_API_KEY. Reuses the eco-mcp-app SSM param since there's one
# admin token per Eco server; no reason to fan out.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ${NAME}-upstream
  namespace: ${NAME}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: ${NAME}-upstream
    creationPolicy: Owner
  data:
    - secretKey: UPSTREAM_API_KEY
      remoteRef:
        key: /eco-mcp-app/api-admin-token

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${NAME}-app
  namespace: ${NAME}
  labels:
    app: ${NAME}-app
spec:
  selector:
    matchLabels:
      app: ${NAME}-app
  template:
    metadata:
      labels:
        app: ${NAME}-app
    spec:
      # Resolve eco.coilysiren.me to kai-server's LAN IP from inside the pod.
      # Going out through the public DNS would require hairpin NAT on the
      # home router, which it doesn't support (same limitation that forced
      # cert-manager onto DNS-01 — see kai-server README). Hardcoded IP is
      # fine: single-node k3s, stable home LAN, same IP cert-manager uses.
      # eco-mcp-app applies the same fix; see its 1a885eac commit.
      hostAliases:
        - ip: "192.168.0.194"
          hostnames:
            - "eco.coilysiren.me"
      containers:
        - name: ${NAME}
          image: ${IMAGE}
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          env:
            - name: PORT
              value: "80"
            - name: UPSTREAM_URL
              value: "http://eco.coilysiren.me:3001/api/v1/skills"
            - name: UPSTREAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ${NAME}-upstream
                  key: UPSTREAM_API_KEY
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: ${NAME}-sentry
                  key: SENTRY_DSN
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: ${NAME}-service
  namespace: ${NAME}
  annotations:
    tailscale.com/expose: "true"
spec:
  type: ClusterIP
  selector:
    app: ${NAME}-app
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${NAME}-ingress
  namespace: ${NAME}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    kubernetes.io/tls-acme: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - ${DNS_NAME}
      secretName: ${NAME}-tls
  rules:
    - host: ${DNS_NAME}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ${NAME}-service
                port:
                  number: 80
