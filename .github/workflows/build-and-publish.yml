name: build-publish-deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv sync --group dev
      - run: uv run pytest
      - run: uv run ruff check src tests tasks.py
      - run: uv run ruff format --check src tests tasks.py
      - run: uv run mypy src tests tasks.py

  build-publish:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: name=coilysiren-eco-spec-tracker make .build-docker
      - run: docker tag coilysiren-eco-spec-tracker:latest ghcr.io/${{ github.repository }}/coilysiren-eco-spec-tracker:${{ github.sha }}
      - run: docker push ghcr.io/${{ github.repository }}/coilysiren-eco-spec-tracker:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-publish
    steps:
      - uses: actions/checkout@v4
      # The action auths with an ephemeral authkey and brings tailscale up.
      # A second `sudo tailscale up` to advertise flags would try to reauth
      # without a key and hang; push the flags into the action's inputs
      # instead. Hostname is per-run to avoid machine-key collisions.
      - uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          args: --accept-dns --accept-routes
          hostname: github-actions-${{ github.run_id }}
      - name: kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
      - name: kubeconfig
        run: |
          mkdir -p ~/.kube
          cat <<EOF > ~/.kube/config
          apiVersion: v1
          kind: Config
          clusters:
          - name: default
            cluster:
              server: ${{ secrets.K8S_SERVER }}
              certificate-authority-data: ${{ secrets.K8S_CA_DATA }}
          contexts:
          - name: default
            context:
              cluster: default
              user: default
          current-context: default
          preferences: {}
          users:
          - name: default
            user:
              client-certificate-data: ${{ secrets.K8S_CLIENT_CERT_DATA }}
              client-key-data: ${{ secrets.K8S_CLIENT_KEY_DATA }}
          EOF
      - run: make .deploy
